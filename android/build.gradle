buildscript {
    repositories {
        google()
        mavenCentral()
    }

    dependencies {
        classpath 'com.android.tools.build:gradle:8.1.2'
        classpath 'com.google.gms:google-services:4.3.15'
    }
}

apply plugin: "com.android.application"

ext {
    compileSdkVersion = 34
    minSdkVersion = 22
    targetSdkVersion = 34
}

allprojects {
    repositories {
        google()
        mavenCentral()
    }
}


